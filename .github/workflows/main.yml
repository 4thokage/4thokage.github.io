on: [push]
name: CI
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1

      - name: Deploy gh-pages
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
           GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
           BRANCH: gh-pages
           FOLDER: /
